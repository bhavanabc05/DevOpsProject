server {
    listen 80;

    # Serve files from this folder
    root /usr/share/nginx/html;
    index index.html;

    # This is critical for React Router — without it, refreshing
    # any page other than / gives a 404
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}